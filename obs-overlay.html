<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Aligned Order — Live Referral Overlay</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: transparent;
  font-family: 'Raleway', sans-serif;
  width: 400px;
  overflow: hidden;
}

.widget {
  width: 380px;
  background: rgba(13, 11, 26, 0.92);
  border: 1px solid rgba(106, 79, 181, 0.5);
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,0.6), 0 0 0 1px rgba(106,79,181,0.2);
}

/* HEADER */
.header {
  background: linear-gradient(135deg, #1a0f3d, #3d2075);
  padding: 14px 18px 12px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(106,79,181,0.4);
}
.header-logo {
  font-family: 'Cinzel', serif;
  font-size: 11px;
  font-weight: 700;
  color: rgba(240,236,255,0.5);
  letter-spacing: .08em;
}
.header-title {
  font-family: 'Cinzel', serif;
  font-size: 13px;
  font-weight: 700;
  color: #f0ecff;
  letter-spacing: .04em;
  flex: 1;
}
.live-dot {
  width: 7px; height: 7px;
  background: #e05a5a;
  border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
  flex-shrink: 0;
}
.live-label {
  font-size: 10px;
  font-weight: 800;
  color: #e05a5a;
  letter-spacing: .1em;
}
@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:.5; transform:scale(1.3); }
}

/* LEADERBOARD */
.lb-list {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-height: 60px;
}

.lb-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 9px;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.06);
  animation: fadeIn .35s ease;
}
.lb-row.gold   { background: rgba(212,168,75,0.1);  border-color: rgba(212,168,75,0.2); }
.lb-row.silver { background: rgba(180,180,200,0.08); border-color: rgba(180,180,200,0.15); }
.lb-row.bronze { background: rgba(168,90,40,0.1);   border-color: rgba(168,90,40,0.2); }

@keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:none; } }

.lb-rank {
  font-size: 15px;
  width: 22px;
  text-align: center;
  flex-shrink: 0;
}
.lb-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 800;
  flex-shrink: 0;
  background: rgba(106,79,181,0.3);
  color: #c5b8f0;
  border: 1px solid rgba(106,79,181,0.4);
}
.lb-name {
  flex: 1;
  font-size: 13px;
  font-weight: 700;
  color: #f0ecff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.lb-bar-wrap {
  width: 60px;
  height: 5px;
  background: rgba(255,255,255,0.08);
  border-radius: 3px;
  overflow: hidden;
  flex-shrink: 0;
}
.lb-bar {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, #6a4fb5, #d4a84b);
  transition: width .6s cubic-bezier(.4,0,.2,1);
}
.lb-count {
  font-size: 12px;
  font-weight: 800;
  color: #d4a84b;
  width: 30px;
  text-align: right;
  flex-shrink: 0;
}
.lb-pts {
  font-size: 10px;
  font-weight: 700;
  color: rgba(212,168,75,0.55);
  flex-shrink: 0;
}

.empty-row {
  text-align: center;
  padding: 14px;
  font-size: 12px;
  color: rgba(240,236,255,0.3);
}

/* DIVIDER */
.divider {
  height: 1px;
  background: rgba(106,79,181,0.2);
  margin: 0 14px;
}

/* CTA */
.cta {
  padding: 12px 14px 14px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.cta-qr {
  width: 60px; height: 60px;
  border-radius: 8px;
  overflow: hidden;
  flex-shrink: 0;
  background: white;
  padding: 4px;
}
.cta-qr img { width: 100%; height: 100%; display: block; }
.cta-text { flex: 1; }
.cta-label {
  font-size: 10px;
  font-weight: 800;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: rgba(240,236,255,0.4);
  margin-bottom: 4px;
}
.cta-url {
  font-size: 12px;
  font-weight: 800;
  color: #d4a84b;
  line-height: 1.4;
  word-break: break-all;
}
.cta-sub {
  font-size: 10px;
  color: rgba(240,236,255,0.4);
  margin-top: 3px;
  line-height: 1.4;
}

/* TICKER at bottom */
.ticker {
  background: rgba(106,79,181,0.15);
  border-top: 1px solid rgba(106,79,181,0.2);
  padding: 7px 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  overflow: hidden;
}
.ticker-label {
  font-size: 10px;
  font-weight: 800;
  color: #9b7fd4;
  letter-spacing: .08em;
  white-space: nowrap;
  flex-shrink: 0;
}
.ticker-track { flex: 1; overflow: hidden; }
.ticker-text {
  font-size: 11px;
  font-weight: 600;
  color: rgba(240,236,255,0.7);
  white-space: nowrap;
  display: inline-block;
  animation: ticker 18s linear infinite;
}
@keyframes ticker {
  from { transform: translateX(100%); }
  to   { transform: translateX(-100%); }
}

/* REFRESH indicator */
.refresh-bar {
  height: 2px;
  background: rgba(106,79,181,0.2);
  position: relative;
  overflow: hidden;
}
.refresh-progress {
  height: 100%;
  background: linear-gradient(90deg, #6a4fb5, #d4a84b);
  width: 0%;
  transition: width linear;
}
</style>
</head>
<body>

<div class="widget">

  <!-- Refresh progress bar -->
  <div class="refresh-bar"><div class="refresh-progress" id="refreshBar"></div></div>

  <!-- Header -->
  <div class="header">
    <div class="live-dot"></div>
    <span class="live-label">LIVE</span>
    <div class="header-title">Referral Leaderboard</div>
    <div class="header-logo">✦ Aligned Order</div>
  </div>

  <!-- Leaderboard rows -->
  <div class="lb-list" id="lbList">
    <div class="empty-row">Loading leaderboard…</div>
  </div>

  <div class="divider"></div>

  <!-- CTA section -->
  <div class="cta">
    <div class="cta-qr">
      <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=https://alignedorder.netlify.app/referral.html&bgcolor=ffffff&color=000000&margin=1" alt="QR code">
    </div>
    <div class="cta-text">
      <div class="cta-label">Get your referral link</div>
      <div class="cta-url">alignedorder.netlify.app<br>/referral.html</div>
      <div class="cta-sub">Refer viewers → Earn rewards</div>
    </div>
  </div>

  <!-- Ticker -->
  <div class="ticker">
    <span class="ticker-label">HOW TO</span>
    <div class="ticker-track">
      <span class="ticker-text">Visit the link → Enter your name & email → Get your unique link → Share it in the chat → Earn points for every verified referral!</span>
    </div>
  </div>

</div>

<script>
const LEADS_API = 'https://thealignedorder.netlify.app/.netlify/functions/leads';
const REFRESH_INTERVAL = 30000; // 30 seconds
let refreshTimer = null;
let progressTimer = null;

const medals = ['🥇','🥈','🥉'];
const rowClass = ['gold','silver','bronze'];

async function loadLeaderboard() {
  try {
    const [refRes, compRes] = await Promise.allSettled([
      fetch(LEADS_API + '?sheet=referrers', { cache:'no-store' }),
      fetch(LEADS_API + '?sheet=referrals', { cache:'no-store' })
    ]);

    let referrers = [], referrals = [];
    if (refRes.status==='fulfilled' && refRes.value.ok) {
      try { referrers = JSON.parse(await refRes.value.text()); } catch(_) {}
    }
    if (compRes.status==='fulfilled' && compRes.value.ok) {
      try { referrals = JSON.parse(await compRes.value.text()); } catch(_) {}
    }

    // Count verified referrals per code
    const counts = {};
    referrals.filter(r => r.completed==='true' || r.completed===true)
      .forEach(r => { counts[r.referrer_code] = (counts[r.referrer_code]||0)+1; });

    // Sort referrers by count
    const sorted = referrers
      .map(r => ({ ...r, count: counts[r.ref_code]||0 }))
      .filter(r => r.count > 0 || referrers.length <= 3)
      .sort((a,b) => b.count - a.count)
      .slice(0, 5);

    const maxCount = sorted.length ? Math.max(...sorted.map(r=>r.count), 1) : 1;
    const el = document.getElementById('lbList');

    if (!sorted.length) {
      el.innerHTML = '<div class="empty-row">Be the first to earn referrals!</div>';
      return;
    }

    el.innerHTML = sorted.map((r, i) => {
      const initials = (r.name||'?').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
      const barPct   = Math.round((r.count / maxCount) * 100);
      const pts      = r.count * 10;
      const rowCls   = rowClass[i] || '';
      const medal    = medals[i] || (i+1);
      return `<div class="lb-row ${rowCls}">
        <span class="lb-rank">${medal}</span>
        <div class="lb-avatar">${initials}</div>
        <div class="lb-name">${(r.name||'').split(' ')[0]}</div>
        <div class="lb-bar-wrap"><div class="lb-bar" style="width:${barPct}%"></div></div>
        <div class="lb-count">${r.count}</div>
        <div class="lb-pts">${pts}pts</div>
      </div>`;
    }).join('');

  } catch(e) {
    document.getElementById('lbList').innerHTML = '<div class="empty-row">Connecting…</div>';
  }
}

function startProgressBar() {
  const bar = document.getElementById('refreshBar');
  bar.style.transition = 'none';
  bar.style.width = '0%';
  requestAnimationFrame(() => {
    bar.style.transition = `width ${REFRESH_INTERVAL}ms linear`;
    bar.style.width = '100%';
  });
}

function startAutoRefresh() {
  loadLeaderboard();
  startProgressBar();
  clearInterval(refreshTimer);
  refreshTimer = setInterval(() => {
    loadLeaderboard();
    startProgressBar();
  }, REFRESH_INTERVAL);
}

// Start
startAutoRefresh();
</script>
</body>
</html>
